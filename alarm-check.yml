name: Meeting Alarm Check

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  check-alarms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Check and send alarms
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node check-alarms.js
